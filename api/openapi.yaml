          description: Group with member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupMember'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /groups:
    get:
      tags: [Groups]
      summary: Get all groups (role-filtered)
      description: |
        - `admin` / `master_trainer` — all groups
        - `trainer` — managed groups only
        - `group_leader` — own group only
        - `agent` — 403
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  ##############################################################################
  # EVENTS
  ##############################################################################

  /events:
    post:
      tags: [Events]
      summary: Create a new event
      description: |
        Accessible by: admin, master_trainer, trainer, group_leader.

        - Trainers can only assign events to their managed groups.
        - Group leaders can only assign events to their own group.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventTitle, date, venue, description, groupIds]
              properties:
                eventTitle:
                  type: string
                  minLength: 3
                  example: Monthly Coffee Hangout
                date:
                  type: string
                  format: date-time
                  example: '2025-07-15T09:00:00Z'
                venue:
                  type: string
                  minLength: 3
                  example: KL Sentral, Level 3
                meetingLink:
                  type: string
                  format: uri
                  nullable: true
                  example: 'https://meet.google.com/abc-defg-hij'
                description:
                  type: string
                  minLength: 10
                  example: Monthly group meetup to discuss targets and share tips.
                groupIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: [grp_xyz]
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  eventId:
                    type: string
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: One or more groups not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Events]
      summary: Get all events (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/EventStatus'
        - name: groupId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of events (most recent first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/my-events:
    get:
      tags: [Events]
      summary: Get upcoming events for the current user's groups
      description: Returns upcoming events filtered by the user's group membership or managed groups. Results are ordered by date ascending.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of upcoming events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{eventId}:
    get:
      tags: [Events]
      summary: Get a specific event by ID
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Events]
      summary: Update an event
      description: Admin can update any event. The creator can update their own event.
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one field must be provided
              properties:
                eventTitle:
                  type: string
                  minLength: 3
                date:
                  type: string
                  format: date-time
                venue:
                  type: string
                  minLength: 3
                meetingLink:
                  type: string
                  format: uri
                  nullable: true
                description:
                  type: string
                  minLength: 10
                groupIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                status:
                  $ref: '#/components/schemas/EventStatus'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Events]
      summary: Delete an event
      description: Admin can delete any event. The creator can delete their own event.
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  ##############################################################################
  # ADMIN – USERS
  ##############################################################################

  /admin/users:
    post:
      tags: [Admin – Users]
      summary: Create a new user (admin only)
      description: |
        Creates a Firebase Auth account and Firestore document.

        Required fields by role:
        - All roles: `email`, `password`, `name`, `role`
        - `agent` / `group_leader`: additionally requires `agentCode`
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 6
                name:
                  type: string
                role:
                  $ref: '#/components/schemas/UserRole'
                agentCode:
                  type: string
                  description: Required for agent and group_leader roles
                agency:
                  type: string
                location:
                  type: string
                phone:
                  type: string
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  userId:
                    type: string
                  agentCode:
                    type: string
                    nullable: true
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users/{userId}/status:
    patch:
      tags: [Admin – Users]
      summary: Update user status (admin only)
      description: Toggle a user between active and inactive. Also updates their Firebase Auth disabled flag.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, inactive]
                  example: inactive
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users/{userId}:
    delete:
      tags: [Admin – Users]
      summary: Permanently delete a user (admin only)
      description: |
        Deletes the Firestore document and Firebase Auth account.
        If the user is in a group, they are removed from `memberIds`.

        Trainers with assigned groups cannot be deleted — reassign groups first.

        Consider using `PATCH /admin/users/:userId/status` with `inactive` for a soft delete.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Cannot delete self, or trainer has assigned groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  ##############################################################################
  # ADMIN – PROSPECTS
  ##############################################################################

  /admin/all-prospects:
    get:
      tags: [Admin – Prospects]
      summary: Get all prospects system-wide (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            example: 100
      responses:
        '200':
          description: All prospects
          content:
            application/json:
              schema:
                type: object
                properties:
                  prospects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prospect'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  ##############################################################################
  # ADMIN – GROUPS
  ##############################################################################

  /admin/groups:
    post:
      tags: [Admin – Groups]
      summary: Create a new group (admin only)
      description: |
        `name` is the only required field. All other fields are optional.

        If `leaderId` is provided it must appear in `memberIds`.
        If the leader's current role is `agent`, they will be automatically promoted to `group_leader`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 3
                  example: Sales Power
                leaderId:
                  type: string
                  description: UID of the group leader (must be in memberIds)
                  example: uid_leader
                trainerIds:
                  type: array
                  items:
                    type: string
                  description: UIDs of trainers or master_trainers
                  example: [uid_trainer1]
                memberIds:
                  type: array
                  items:
                    type: string
                  description: UIDs of all group members (agents / group leaders)
                  example: [uid_leader, uid_agent1, uid_agent2]
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  groupId:
                    type: string
                  message:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only, or invalid trainer/leader role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: One or more specified users not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/groups/{groupId}:
    put:
      tags: [Admin – Groups]
      summary: Update a group (admin only)
      description: |
        At least one of `name`, `trainerIds`, `leaderId`, or `memberIds` must be provided.

        Changing `leaderId` automatically demotes the old leader to `agent` and promotes the new one.
        The leader must always be present in `memberIds`.
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 3
                leaderId:
                  type: string
                trainerIds:
                  type: array
                  items:
                    type: string
                memberIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Admin – Groups]
      summary: Delete a group (admin only)
      description: |
        Permanently deletes the group document.
        All members have their `groupId`/`groupName` cleared.
        All trainers have this group removed from their `managedGroupIds`.
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
