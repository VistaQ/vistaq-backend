openapi: 3.0.3
info:
  title: vistaq API
  version: 1.0.0
  description: |
    Backend API for the vistaq insurance agent management platform.

servers:
  - url: https://stg-api.vistaq.co/api
    description: Staging

tags:
  - name: Health
    description: API health check
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Groups
    description: Group management endpoints

################################################################################
# Paths
################################################################################

paths:

  ##############################################################################
  # HEALTH
  ##############################################################################

  /health:
    get:
      tags: [Health]
      summary: Health check
      description: >
        Returns the current operational status of the API. No authentication is
        required. Intended for uptime monitoring and load-balancer probes.
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-03-04T08:00:00.000Z'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ##############################################################################
  # AUTH
  ##############################################################################

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new agent
      description: >
        Creates a new agent user account under the tenant identified by the
        `X-Tenant-Slug` header. The supplied `agentCode` must exist in the
        tenant's provisioned agent codes and must not have been used previously.
        On success the newly created user record and a session JWT are returned.
        The token may be `null` if the automatic sign-in after registration
        fails — the account is still created in that case.
      security: []
      parameters:
        - name: X-Tenant-Slug
          in: header
          required: true
          description: >
            Slug that identifies the tenant the registering user belongs to.
            Returns 400 if the header is absent or not a string value, and 404
            if no tenant matches the supplied slug.
          schema:
            type: string
            example: acme-insurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - agentCode
                - email
                - password
                - groupId
                - location
              properties:
                fullName:
                  type: string
                  minLength: 1
                  example: Jane Smith
                agentCode:
                  type: string
                  minLength: 1
                  description: >
                    Agent code provisioned by the tenant. Must exist in the
                    tenant's agent_codes table and must not have been used by
                    another account. Always supplied by the client — never
                    auto-generated by the server.
                  example: AGT-00123
                email:
                  type: string
                  format: email
                  example: jane.smith@example.com
                password:
                  type: string
                  minLength: 6
                  description: >
                    Must be at least 6 characters and contain at least one
                    uppercase letter, one special character, and one digit.
                  example: Secret@1
                groupId:
                  type: string
                  format: uuid
                  description: UUID of the group the agent belongs to.
                  example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                location:
                  type: string
                  minLength: 1
                  example: Singapore
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [user, token]
                    properties:
                      user:
                        $ref: '#/components/schemas/UserObject'
                      token:
                        type: string
                        nullable: true
                        description: >
                          JWT session token. `null` if the automatic sign-in
                          after registration failed — the account is still
                          created.
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: >
            Bad request. Returned when the `X-Tenant-Slug` header is missing,
            request body fails validation, or the agent code is invalid or
            already used.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missingHeader:
                  summary: Missing X-Tenant-Slug header
                  value:
                    message: X-Tenant-Slug header is required
                invalidAgentCode:
                  summary: Invalid or already used agent code
                  value:
                    message: Invalid or already used agent code
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: too_small
                        minimum: 6
                        type: string
                        inclusive: true
                        exact: false
                        message: Password must be at least 6 characters
                        path: [password]
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Tenant not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in an existing agent
      description: >
        Authenticates an agent under the tenant identified by the `X-Tenant-Slug`
        header using email and password. On success, returns the user record and a
        JWT session token.
      security: []
      parameters:
        - name: X-Tenant-Slug
          in: header
          required: true
          description: >
            Slug that identifies the tenant the authenticating user belongs to.
            Returns 400 if the header is absent or not a string value, and 404
            if no tenant matches the supplied slug.
          schema:
            type: string
            example: acme-insurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: jane.smith@example.com
                password:
                  type: string
                  example: Secret@1
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required: [user, token]
                    properties:
                      user:
                        $ref: '#/components/schemas/UserObject'
                      token:
                        type: string
                        description: JWT session token.
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: >
            Bad request. Returned when the `X-Tenant-Slug` header is missing,
            request body fails validation, or the supplied credentials are invalid.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missingHeader:
                  summary: Missing X-Tenant-Slug header
                  value:
                    message: X-Tenant-Slug header is required
                invalidCredentials:
                  summary: Invalid credentials
                  value:
                    message: Invalid credentials
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: invalid_string
                        validation: email
                        message: Invalid email
                        path: [email]
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Tenant not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current user
      description: >
        Invalidates the session associated with the supplied Bearer token.
        The `Authorization` header must be present and contain a non-empty
        token in the form `Bearer <token>`. Returns 401 if the header is
        missing, malformed, or the token portion is empty.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            does not start with `Bearer `, or the token portion is empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingHeader:
                  summary: Missing Authorization header
                  value:
                    message: Authorization header is required
                emptyToken:
                  summary: Empty token in Authorization header
                  value:
                    message: Authorization token is required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ##############################################################################
  # USERS
  ##############################################################################

  /users:
    get:
      tags: [Users]
      summary: List all users in the tenant
      description: >
        Returns all users belonging to the authenticated user's tenant.
        The caller must supply a valid Bearer token. The response contains
        an array of user objects scoped to the caller's tenant.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserObject'
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get a user by ID
      description: >
        Returns the user record for the given `userId`. The caller must supply
        a valid Bearer token. RLS ensures only users visible to the caller's
        tenant are returned — a user that exists but is not visible due to RLS
        is treated as not found.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: UUID of the user to retrieve.
          schema:
            type: string
            format: uuid
            example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserObject'
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '404':
          description: >
            Not found. Returned when no user exists for the given `userId`, or
            the user is not visible to the caller due to RLS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: User not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Update a user
      description: >
        Updates the user record for the given `userId`. The caller must supply
        a valid Bearer token. Non-admin users can only update themselves — a
        403 is returned if they attempt to update another user. Non-admin
        callers cannot update the `role` or `status` fields; those fields are
        silently stripped from the request body. At least one field must be
        provided.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: UUID of the user to update.
          schema:
            type: string
            format: uuid
            example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
                  example: jane.smith@example.com
                name:
                  type: string
                  minLength: 1
                  example: Jane Smith
                phone:
                  type: string
                  minLength: 1
                  example: '+6591234567'
                agency:
                  type: string
                  minLength: 1
                  example: Acme Insurance
                location:
                  type: string
                  minLength: 1
                  example: Singapore
                role:
                  type: string
                  enum: [admin, master_trainer, trainer, agent]
                  description: >
                    Only honoured for admin callers. Non-admin callers may
                    include this field but it is silently stripped.
                  example: trainer
                status:
                  type: string
                  enum: [active, inactive]
                  description: >
                    Only honoured for admin callers. Non-admin callers may
                    include this field but it is silently stripped.
                  example: active
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserObject'
        '400':
          description: >
            Bad request. Returned when the request body fails validation
            (e.g. no fields provided or invalid values).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: Validation failed
                errors:
                  - code: custom
                    message: At least one field must be provided
                    path: []
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '403':
          description: >
            Forbidden. Returned when a non-admin user attempts to update
            another user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: >
            Not found. Returned when no user exists for the given `userId`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: User not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Delete a user
      description: >
        Deletes a user from the users table and Supabase Auth.
        RLS enforces access control — if the authenticated user cannot see the
        target user, a 404 is returned. The Auth deletion is best-effort;
        failure is logged but does not block a successful response.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: The UUID of the user to delete.
          schema:
            type: string
            format: uuid
            example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '404':
          description: >
            Not found. Returned when no user exists for the given `userId`, or
            the user is not visible to the caller due to RLS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: User not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Users]
      summary: Create a new user (admin only)
      description: >
        Creates a new user account within the authenticated admin's tenant.
        The caller must supply a valid Bearer token belonging to a user with
        the `admin` role. When `role` is `agent`, an `agentCode` must also be
        provided; it must exist in the tenant's provisioned agent codes and
        must not have been previously used.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  minLength: 1
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john.doe@example.com
                password:
                  type: string
                  minLength: 8
                  description: >
                    Must be at least 8 characters and contain at least one
                    uppercase letter and one digit.
                  example: Secret@1
                role:
                  type: string
                  enum: [admin, master_trainer, trainer, group_leader, agent]
                  example: agent
                agentCode:
                  type: string
                  description: >
                    Required when `role` is `agent`. Agent code provisioned by
                    the tenant. Must exist in the tenant's agent_codes table and
                    must not have been used by another account. Always supplied
                    by the client — never auto-generated by the server.
                  example: AGT-00123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserObject'
        '400':
          description: >
            Bad request. Returned when the request body fails validation or
            the supplied agent code is invalid or already used.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: too_small
                        minimum: 8
                        type: string
                        inclusive: true
                        exact: false
                        message: Password must be at least 8 characters
                        path: [password]
                invalidAgentCode:
                  summary: Invalid or already used agent code
                  value:
                    message: Invalid or already used agent code
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '403':
          description: Forbidden. Returned when the authenticated user is not an admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ##############################################################################
  # GROUPS
  ##############################################################################

  /groups:
    get:
      tags: [Groups]
      summary: List all groups in the tenant
      description: >
        Returns all groups belonging to the authenticated user's tenant.
        The caller must supply a valid Bearer token. Supabase RLS handles
        tenant scoping automatically — any authenticated user can call this
        endpoint and will receive only the groups visible to their tenant.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupObject'
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Groups]
      summary: Create a new group (admin only)
      description: >
        Creates a new group within the authenticated admin's tenant.
        The caller must supply a valid Bearer token belonging to a user with
        the `admin` role. The optional `leader_id` must reference a user with
        the `agent` role, and the optional `trainer_id` must reference a user
        with the `trainer` role. Both referenced users must belong to the
        caller's tenant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Alpha Team
                leader_id:
                  type: string
                  format: uuid
                  description: >
                    UUID of the user to assign as group leader. Must be a user
                    with the `agent` role and must belong to the caller's tenant.
                  example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
                trainer_id:
                  type: string
                  format: uuid
                  description: >
                    UUID of the user to assign as group trainer. Must be a user
                    with the `trainer` role and must belong to the caller's tenant.
                  example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '201':
          description: Group created successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/GroupObject'
        '400':
          description: >
            Bad request. Returned when the request body fails validation or
            a domain rule is violated (e.g. invalid role for leader or trainer,
            or referenced user not found in the tenant).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: too_small
                        minimum: 1
                        type: string
                        inclusive: true
                        exact: false
                        message: String must contain at least 1 character(s)
                        path: [name]
                invalidLeaderRole:
                  summary: Leader does not have the agent role
                  value:
                    message: Leader must currently have the agent role
                invalidTrainerRole:
                  summary: Trainer does not have the trainer role
                  value:
                    message: Trainer must currently have the trainer role
                userNotInTenant:
                  summary: Referenced user not found in tenant
                  value:
                    message: User not found in tenant
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '403':
          description: Forbidden. Returned when the authenticated user is not an admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /groups/{groupId}:
    get:
      tags: [Groups]
      summary: Get a group by ID
      description: >
        Returns a single group identified by `groupId`. The caller must supply a
        valid Bearer token. Supabase RLS handles tenant scoping automatically —
        any authenticated user can call this endpoint and will only be able to
        retrieve groups visible to their tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: UUID of the group to retrieve.
          schema:
            type: string
            format: uuid
            example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
      responses:
        '200':
          description: Group retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/GroupObject'
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '404':
          description: Not found. Returned when no group exists for the given `groupId`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Group not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Groups]
      summary: Update a group (admin only)
      description: >
        Updates the group identified by `groupId`. The caller must supply a valid
        Bearer token belonging to a user with the `admin` role. All request body
        fields are optional, but at least one must be provided. When `leader_id`
        is supplied and differs from the current leader, the new leader is promoted
        to `group_leader` and the previous leader is demoted back to `agent`. When
        `trainer_id` is supplied, a new `group_trainers` record is inserted. When
        `member_ids` is supplied, the `group_id` field on each referenced user is
        set to this group. All referenced users must exist within the caller's tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: UUID of the group to update.
          schema:
            type: string
            format: uuid
            example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Bravo Team
                status:
                  type: string
                  enum: [active, inactive]
                  example: active
                leader_id:
                  type: string
                  format: uuid
                  description: >
                    UUID of the user to promote to group leader. Must be a user
                    with the `agent` role. If the group already has a leader,
                    that leader is demoted back to `agent`.
                  example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
                trainer_id:
                  type: string
                  format: uuid
                  description: >
                    UUID of the user to add as a group trainer. Must be a user
                    with the `trainer` role. Inserts a new `group_trainers` record.
                  example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                member_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                  description: >
                    Array of user UUIDs to assign to this group. Sets the
                    `group_id` field on each referenced user. All provided IDs
                    must exist within the caller's tenant.
                  example:
                    - a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a11
                    - b1ccde11-8d1c-5fa9-cc7e-7cc0ce491b22
      responses:
        '200':
          description: Group updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/GroupObject'
        '400':
          description: >
            Bad request. Returned when the request body fails validation (e.g. no
            fields provided or invalid values), or a domain rule is violated (e.g.
            the new leader does not have the `agent` role, the trainer does not
            have the `trainer` role, or one or more `member_ids` could not be found).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationFailure:
                  summary: Request body validation failure
                  value:
                    message: Validation failed
                    errors:
                      - code: custom
                        message: At least one field must be provided
                        path: []
                invalidLeaderRole:
                  summary: Proposed leader does not have the agent role
                  value:
                    message: Leader must currently have the agent role
                invalidTrainerRole:
                  summary: Proposed trainer does not have the trainer role
                  value:
                    message: Trainer must currently have the trainer role
                missingMembers:
                  summary: One or more member_ids could not be found
                  value:
                    message: One or more members could not be found
        '401':
          description: >
            Unauthorized. Returned when the `Authorization` header is absent,
            malformed, or contains an invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Unauthorized
        '403':
          description: Forbidden. Returned when the authenticated user is not an admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Forbidden
        '404':
          description: >
            Not found. Returned when no group exists for the given `groupId`, or
            a referenced user (leader, trainer, or member) could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                groupNotFound:
                  summary: Group not found
                  value:
                    message: Group not found
                userNotFound:
                  summary: Referenced user not found
                  value:
                    message: User not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

################################################################################
# Components
################################################################################

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    UserObject:
      type: object
      required:
        - id
        - tenant_id
        - email
        - name
        - role
        - agent_code
        - location
        - group_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        email:
          type: string
          format: email
          example: jane.smith@example.com
        name:
          type: string
          example: Jane Smith
        role:
          type: string
          enum: [admin, master_trainer, trainer, group_leader, agent]
          example: agent
        agent_code:
          type: string
          example: AGT-00123
        location:
          type: string
          example: Singapore
        group_id:
          type: string
          format: uuid
          nullable: true
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        status:
          type: string
          enum: [active, inactive, suspended]
          example: active
        created_at:
          type: string
          format: date-time
          example: '2026-03-07T08:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-03-07T08:00:00.000Z'

    GroupObject:
      type: object
      required:
        - id
        - tenant_id
        - name
        - status
        - leader_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        tenant_id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: Alpha Team
        status:
          type: string
          example: active
        leader_id:
          type: string
          format: uuid
          nullable: true
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        created_at:
          type: string
          format: date-time
          example: '2026-03-10T08:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-03-10T08:00:00.000Z'

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Server Error

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
          example: []
